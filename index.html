<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>근태 특이사항 등록</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --paper:#f4f1ea; --paper-2:#ece7dc; --ink:#1c1b18; --ink-soft:#5c574d;
    --line:#d9d3c5; --field:#16604a; --in:#2f6db5; --out:#a8552a; --accent:#16604a;
    --shadow:0 1px 0 rgba(0,0,0,.04),0 8px 24px -12px rgba(28,27,24,.25);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Pretendard",-apple-system,sans-serif;
    background:radial-gradient(120% 60% at 50% -10%, #fbf9f4 0%, var(--paper) 55%) fixed;
    color:var(--ink);min-height:100vh;padding:22px 18px 40px;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:440px;margin:0 auto;}
  .head{margin-bottom:18px;}
  .kicker{font-size:12px;letter-spacing:.18em;font-weight:700;color:var(--accent);text-transform:uppercase;margin:0 0 6px;}
  .title{font-size:23px;font-weight:800;letter-spacing:-.02em;margin:0;line-height:1.2;}

  .card{background:#fffdf9;border:1px solid var(--line);border-radius:18px;padding:18px 16px;box-shadow:var(--shadow);margin-top:14px;}
  label.lab{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin:18px 2px 9px;}
  label.lab:first-child{margin-top:2px;}
  .sub{font-weight:600;color:var(--ink-soft);font-size:12px;}

  /* identity */
  .who{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px 7px 9px;box-shadow:var(--shadow);font-size:14px;font-weight:700;}
  .who .dot{width:24px;height:24px;border-radius:50%;background:var(--paper-2);display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--accent);}
  .who small{color:var(--ink-soft);font-weight:600;}
  .change{margin-left:4px;font-size:12px;color:var(--in);font-weight:700;cursor:pointer;text-decoration:underline;}
  .firstNotice{background:#fff7ec;border:1px solid #f0d9b0;color:#8a5a16;border-radius:12px;padding:11px 13px;font-size:13px;font-weight:600;line-height:1.5;margin-bottom:10px;}

  /* segmented */
  .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .seg button{border:1.5px solid var(--line);background:#fff;border-radius:13px;padding:13px 6px;cursor:pointer;text-align:center;transition:.16s;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .seg button .em{font-size:19px;line-height:1;}
  .seg button .nm{font-size:14px;font-weight:800;color:var(--ink);}
  .seg button .sb{font-size:10.5px;color:var(--ink-soft);font-weight:600;}
  .seg button[aria-pressed="true"]{border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,96,74,.12);transform:translateY(-1px);}
  .seg button[data-k="직출"][aria-pressed="true"]{--accent:var(--in);border-color:var(--in);box-shadow:0 0 0 3px rgba(47,109,181,.12);}
  .seg button[data-k="직퇴"][aria-pressed="true"]{--accent:var(--out);border-color:var(--out);box-shadow:0 0 0 3px rgba(168,85,42,.12);}

  input[type=datetime-local],input[type=time],textarea,.search{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink);background:#fff;outline:none;transition:.16s;}
  input:focus,textarea:focus,.search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,96,74,.10);}
  textarea{resize:none;min-height:78px;line-height:1.5;}
  .hint{font-size:12px;color:var(--ink-soft);margin:7px 2px 0;}
  .row-dim{opacity:.45;pointer-events:none;}

  /* companion / picker */
  .chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:5px;background:#e7f1ed;color:var(--field);border:1px solid #bcdcd0;border-radius:999px;padding:5px 9px 5px 11px;font-size:13.5px;font-weight:700;}
  .chip b{cursor:pointer;font-weight:800;}
  .addbtn{display:inline-flex;align-items:center;gap:4px;border:1.5px dashed var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:13.5px;color:var(--ink-soft);font-weight:700;cursor:pointer;}
  .picker{border:1.5px solid var(--line);border-radius:13px;background:#fff;padding:9px;margin-top:9px;display:none;}
  .picker.open{display:block;}
  .picklist{max-height:200px;overflow:auto;margin-top:7px;}
  .pickrow{display:flex;align-items:center;justify-content:space-between;padding:9px 8px;border-radius:9px;cursor:pointer;font-size:14.5px;font-weight:600;}
  .pickrow:active{background:var(--paper);}
  .pickrow .ck{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);display:grid;place-items:center;color:#fff;font-size:13px;}
  .pickrow[aria-selected="true"] .ck{background:var(--field);border-color:var(--field);}
  .empty{font-size:13px;color:var(--ink-soft);text-align:center;padding:14px;}

  .submit{margin-top:22px;width:100%;border:none;border-radius:14px;background:var(--accent);color:#fff;font-family:inherit;font-size:16.5px;font-weight:800;padding:16px;cursor:pointer;transition:.16s;box-shadow:0 8px 20px -8px rgba(22,96,74,.6);}
  .submit:active{transform:translateY(1px);}
  .submit:disabled{opacity:.5;box-shadow:none;cursor:default;}

  .state{position:fixed;inset:0;display:none;place-items:center;background:rgba(244,241,234,.93);backdrop-filter:blur(3px);padding:30px;text-align:center;z-index:50;}
  .state.on{display:grid;}
  .state .icon{font-size:42px;margin-bottom:12px;}
  .state h2{margin:0 0 6px;font-size:20px;font-weight:800;}
  .state p{margin:0;color:var(--ink-soft);font-size:14px;line-height:1.5;}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:14px;}
  .retry{margin-top:18px;border:1.5px solid var(--accent);background:#fff;color:var(--accent);border-radius:11px;padding:11px 22px;font-weight:800;font-family:inherit;font-size:14px;cursor:pointer;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <p class="kicker">근태 특이사항</p>
      <h1 class="title">직출 · 직퇴 · 외근 등록</h1>
    </div>

    <div class="card" id="card" style="opacity:.5;pointer-events:none;">
      <label class="lab">등록자</label>
      <div id="firstNotice" class="firstNotice" style="display:none;">처음이시네요 — 아래에서 <b>본인 이름</b>을 한 번만 선택해 주세요. 다음부터는 자동 인식됩니다.</div>
      <div id="idChip" style="display:none;">
        <span class="who"><span class="dot" id="ini">·</span><span id="uname">-</span><small>자동 인식</small></span>
        <span class="change" id="changeName">변경</span>
      </div>
      <div id="namePicker" class="picker open" style="display:none;">
        <input class="search" id="nameSearch" placeholder="본인 이름 검색…" />
        <div class="picklist" id="nameList"></div>
      </div>

      <label class="lab">구분</label>
      <div class="seg" id="seg">
        <button type="button" data-k="직출" aria-pressed="false"><span class="em">🌅</span><span class="nm">직출</span><span class="sb">직접 출근</span></button>
        <button type="button" data-k="외근" aria-pressed="false"><span class="em">🚗</span><span class="nm">외근</span><span class="sb">외부 업무</span></button>
        <button type="button" data-k="직퇴" aria-pressed="false"><span class="em">🌙</span><span class="nm">직퇴</span><span class="sb">직접 퇴근</span></button>
      </div>

      <label class="lab">일시</label>
      <input type="datetime-local" id="when" />

      <label class="lab">동행자 <span class="sub">(혼자면 비워두세요)</span></label>
      <div class="chips" id="compChips">
        <span class="addbtn" id="compToggle">＋ 동행자 추가</span>
      </div>
      <div class="picker" id="compPicker">
        <input class="search" id="compSearch" placeholder="이름 검색…" />
        <div class="picklist" id="compList"></div>
      </div>

      <label class="lab">업무 내용</label>
      <textarea id="memo" placeholder="예) KTC 계약서 전달 / 국토부 미팅"></textarea>

      <div id="retBox">
        <label class="lab">예상 복귀시간</label>
        <input type="time" id="ret" />
        <p class="hint" id="retHint">직퇴는 복귀시간이 없어 자동 생략됩니다.</p>
      </div>

      <button class="submit" id="go" disabled>등록하기</button>
    </div>
  </div>

  <div class="state" id="loading"><div><div class="spin"></div><p>등록 중…</p></div></div>
  <div class="state" id="done"><div><div class="icon">✅</div><h2>등록 완료</h2><p>단톡방에 게시되고 시트에 저장됐어요.<br/>잠시 후 창이 닫힙니다.</p></div></div>
  <div class="state" id="err"><div><div class="icon">⚠️</div><h2>등록 실패</h2><p id="errMsg">잠시 후 다시 시도해 주세요.</p><button class="retry" onclick="location.reload()">다시 시도</button></div></div>

<script>
  // ====== 설정 ======
  const LIFF_ID = "2010344333-WGKDBqnO";
  const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbx0GfdcvJUt1I1yAs3S0ZHW9Mu8L-SGxbkebhW6teRUN08-7xpRScQIkNLkehPJv8vk/exec";
  // ==================

  const $ = function(id){ return document.getElementById(id); };
  let profile=null, ctxType=null, roster=[], userMap={};
  let myName=null, picked=null, companions=[];

  (function setNow(){ var d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); $("when").value=d.toISOString().slice(0,16); })();

  // 구분
  $("seg").addEventListener("click", function(e){
    var b=e.target.closest("button"); if(!b) return;
    Array.prototype.forEach.call($("seg").children, function(x){ x.setAttribute("aria-pressed","false"); });
    b.setAttribute("aria-pressed","true"); picked=b.dataset.k;
    document.documentElement.style.setProperty("--accent", picked==="직출"?"var(--in)":picked==="직퇴"?"var(--out)":"var(--field)");
    $("retBox").classList.toggle("row-dim", picked==="직퇴");
    validate();
  });
  ["when","memo","ret"].forEach(function(id){ $(id).addEventListener("input", validate); });
  function validate(){ $("go").disabled = !(myName && picked && $("when").value && $("memo").value.trim()); }

  // ---- LIFF ----
  async function boot(){
    try{
      await liff.init({ liffId: LIFF_ID });
      ctxType=(liff.getContext()||{}).type;
      profile=await liff.getProfile();
      var cached = profile && localStorage.getItem("conb_name_"+profile.userId);
      if(cached){ setMyName(cached); }
    }catch(err){ profile=null; }
    loadRoster();
  }
  boot();

  // ---- 명단/매핑 불러오기 (JSONP) ----
  function loadRoster(){
    var cb="__roster_"+Date.now();
    window[cb]=function(res){ roster=(res&&res.roster)||[]; userMap=(res&&res.map)||{}; onRoster(); try{delete window[cb];}catch(e){} };
    var s=document.createElement("script");
    s.src=GAS_ENDPOINT+"?action=roster&callback="+cb+"&t="+Date.now();
    s.onerror=function(){ onRoster(); };
    document.head.appendChild(s);
  }

  function onRoster(){
    $("card").style.opacity="1"; $("card").style.pointerEvents="auto";
    var uid = profile && profile.userId;
    if(uid && userMap[uid]){ setMyName(userMap[uid]); }
    else if(!myName){ showNamePicker(); }
    buildCompList();
  }

  function setMyName(name){
    myName=name;
    if(profile){ try{ localStorage.setItem("conb_name_"+profile.userId, name); }catch(e){} }
    $("namePicker").style.display="none";
    $("firstNotice").style.display="none";
    $("idChip").style.display="block";
    $("uname").textContent=name;
    $("ini").textContent=name.slice(0,1);
    buildCompList();
    validate();
  }

  // ---- 본인 이름 선택 (최초 1회) ----
  function showNamePicker(){
    $("firstNotice").style.display="block";
    $("namePicker").style.display="block";
    renderNameList("");
  }
  $("nameSearch").addEventListener("input", function(e){ renderNameList(e.target.value); });
  $("changeName").addEventListener("click", function(){ $("idChip").style.display="none"; showNamePicker(); });
  function renderNameList(q){
    q=(q||"").trim();
    var list=$("nameList"); list.innerHTML="";
    var arr = roster.filter(function(n){ return !q || n.indexOf(q)>=0; });
    if(!arr.length){ list.innerHTML='<div class="empty">명단이 비어있거나 일치하는 이름이 없어요.</div>'; return; }
    arr.forEach(function(n){
      var row=document.createElement("div"); row.className="pickrow";
      row.innerHTML='<span>'+n+'</span>';
      row.addEventListener("click", function(){ setMyName(n); });
      list.appendChild(row);
    });
  }

  // ---- 동행자 선택 ----
  $("compToggle").addEventListener("click", function(){ $("compPicker").classList.toggle("open"); if($("compPicker").classList.contains("open")) buildCompList(); });
  $("compSearch").addEventListener("input", function(e){ buildCompList(e.target.value); });
  function buildCompList(q){
    q=(q||"").trim();
    var list=$("compList"); if(!list) return; list.innerHTML="";
    var arr = roster.filter(function(n){ return n!==myName && (!q || n.indexOf(q)>=0); });
    if(!arr.length){ list.innerHTML='<div class="empty">선택할 사람이 없어요.</div>'; return; }
    arr.forEach(function(n){
      var sel = companions.indexOf(n)>=0;
      var row=document.createElement("div"); row.className="pickrow"; row.setAttribute("aria-selected", sel?"true":"false");
      row.innerHTML='<span>'+n+'</span><span class="ck">'+(sel?'✓':'')+'</span>';
      row.addEventListener("click", function(){
        var i=companions.indexOf(n);
        if(i>=0) companions.splice(i,1); else companions.push(n);
        buildCompList($("compSearch").value); renderChips();
      });
      list.appendChild(row);
    });
  }
  function renderChips(){
    var box=$("compChips");
    box.querySelectorAll(".chip").forEach(function(c){ c.remove(); });
    companions.forEach(function(n){
      var c=document.createElement("span"); c.className="chip";
      c.innerHTML=n+' <b>✕</b>';
      c.querySelector("b").addEventListener("click", function(){
        companions.splice(companions.indexOf(n),1); renderChips(); buildCompList($("compSearch").value);
      });
      box.insertBefore(c, $("compToggle"));
    });
  }

  // ---- 등록 ----
  $("go").addEventListener("click", async function(){
    var when=$("when").value.replace("T"," ");
    var memo=$("memo").value.trim();
    var ret = picked==="직퇴" ? "-" : ($("ret").value||"-");
    var names=[myName].concat(companions);
    var people=[{name:myName, userId:(profile&&profile.userId)||""}].concat(companions.map(function(n){return {name:n,userId:""};}));
    var text="["+names.join(", ")+" · "+picked+"]\n일시: "+when+"\n업무내용: "+memo+"\n예상 복귀시간: "+ret;

    $("loading").classList.add("on");
    try{
      await fetch(GAS_ENDPOINT, {
        method:"POST", mode:"no-cors",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify({ reporterName:myName, reporterUserId:(profile&&profile.userId)||"", type:picked, when:when, memo:memo, ret:ret, people:people })
      });
      if(["group","room","utou"].indexOf(ctxType)>=0){ await liff.sendMessages([{type:"text", text:text}]); }
      $("loading").classList.remove("on");
      $("done").classList.add("on");
      setTimeout(function(){ if(liff.isInClient&&liff.isInClient()) liff.closeWindow(); }, 1500);
    }catch(err){
      $("loading").classList.remove("on");
      $("errMsg").textContent=(err&&err.message)?err.message:"잠시 후 다시 시도해 주세요.";
      $("err").classList.add("on");
    }
  });
</script>
</body>
</html>
