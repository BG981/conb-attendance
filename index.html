<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>근태 특이사항 등록</title>
<link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --paper:#f4f1ea;
    --paper-2:#ece7dc;
    --ink:#1c1b18;
    --ink-soft:#5c574d;
    --line:#d9d3c5;
    --field:#16604a;      /* 외근 */
    --in:#2f6db5;         /* 직출 */
    --out:#a8552a;        /* 직퇴 */
    --accent:#16604a;
    --ok:#16604a;
    --shadow:0 1px 0 rgba(0,0,0,.04),0 8px 24px -12px rgba(28,27,24,.25);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Pretendard","Pretendard Variable",-apple-system,sans-serif;
    background:
      radial-gradient(120% 60% at 50% -10%, #fbf9f4 0%, var(--paper) 55%) fixed;
    color:var(--ink);
    min-height:100vh;
    padding:22px 18px 40px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:440px;margin:0 auto;}
  /* header */
  .head{
    opacity:0;transform:translateY(8px);
    animation:rise .5s .02s cubic-bezier(.2,.7,.3,1) forwards;
    margin-bottom:20px;
  }
  .kicker{
    font-size:12px;letter-spacing:.18em;font-weight:700;
    color:var(--accent);text-transform:uppercase;margin:0 0 6px;
  }
  .title{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0;line-height:1.2;}
  .who{
    margin-top:12px;display:inline-flex;align-items:center;gap:8px;
    background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:7px 13px 7px 9px;box-shadow:var(--shadow);font-size:14px;font-weight:600;
  }
  .who .dot{width:24px;height:24px;border-radius:50%;background:var(--paper-2);
    display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--accent);}
  .who small{color:var(--ink-soft);font-weight:600;}

  .card{
    background:#fffdf9;border:1px solid var(--line);border-radius:18px;
    padding:18px 16px;box-shadow:var(--shadow);
    opacity:0;transform:translateY(10px);
    animation:rise .5s .12s cubic-bezier(.2,.7,.3,1) forwards;
  }
  label.lab{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin:18px 2px 9px;}
  label.lab:first-child{margin-top:2px;}

  /* segmented 구분 */
  .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .seg button{
    border:1.5px solid var(--line);background:#fff;border-radius:13px;
    padding:13px 6px;cursor:pointer;text-align:center;transition:.16s;
    display:flex;flex-direction:column;align-items:center;gap:5px;
  }
  .seg button .em{font-size:19px;line-height:1;}
  .seg button .nm{font-size:14px;font-weight:800;color:var(--ink);}
  .seg button .sub{font-size:10.5px;color:var(--ink-soft);font-weight:600;letter-spacing:.01em;}
  .seg button[aria-pressed="true"]{
    border-color:var(--accent);background:#fff;
    box-shadow:0 0 0 3px rgba(22,96,74,.12);transform:translateY(-1px);
  }
  .seg button[data-k="직출"][aria-pressed="true"]{--accent:var(--in);border-color:var(--in);box-shadow:0 0 0 3px rgba(47,109,181,.12);}
  .seg button[data-k="직퇴"][aria-pressed="true"]{--accent:var(--out);border-color:var(--out);box-shadow:0 0 0 3px rgba(168,85,42,.12);}
  .seg button[data-k="외근"][aria-pressed="true"]{--accent:var(--field);border-color:var(--field);box-shadow:0 0 0 3px rgba(22,96,74,.12);}

  input[type=datetime-local],input[type=time],textarea{
    width:100%;border:1.5px solid var(--line);border-radius:12px;
    padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink);
    background:#fff;outline:none;transition:.16s;
  }
  input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,96,74,.10);}
  textarea{resize:none;min-height:80px;line-height:1.5;}
  .hint{font-size:12px;color:var(--ink-soft);margin:7px 2px 0;}
  .row-dim{opacity:.45;pointer-events:none;}

  .submit{
    margin-top:22px;width:100%;border:none;border-radius:14px;
    background:var(--accent);color:#fff;font-family:inherit;
    font-size:16.5px;font-weight:800;letter-spacing:-.01em;padding:16px;
    cursor:pointer;transition:.16s;box-shadow:0 8px 20px -8px rgba(22,96,74,.6);
  }
  .submit:active{transform:translateY(1px);}
  .submit:disabled{opacity:.5;box-shadow:none;cursor:default;}

  /* states */
  .state{
    position:fixed;inset:0;display:none;place-items:center;
    background:rgba(244,241,234,.92);backdrop-filter:blur(3px);padding:30px;text-align:center;
  }
  .state.on{display:grid;}
  .state .icon{font-size:42px;margin-bottom:12px;}
  .state h2{margin:0 0 6px;font-size:20px;font-weight:800;}
  .state p{margin:0;color:var(--ink-soft);font-size:14px;line-height:1.5;}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:sp .8s linear infinite;margin-bottom:14px;}
  .retry{margin-top:18px;border:1.5px solid var(--accent);background:#fff;color:var(--accent);
    border-radius:11px;padding:11px 22px;font-weight:800;font-family:inherit;font-size:14px;cursor:pointer;}

  @keyframes rise{to{opacity:1;transform:none;}}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <p class="kicker">근태 특이사항</p>
      <h1 class="title">직출 · 직퇴 · 외근 등록</h1>
      <div class="who"><span class="dot" id="ini">·</span><span id="uname">불러오는 중…</span><small id="usub"></small></div>
    </div>

    <div class="card">
      <label class="lab">구분</label>
      <div class="seg" id="seg">
        <button type="button" data-k="직출" aria-pressed="false"><span class="em">🌅</span><span class="nm">직출</span><span class="sub">직접 출근</span></button>
        <button type="button" data-k="외근" aria-pressed="false"><span class="em">🚗</span><span class="nm">외근</span><span class="sub">외부 업무</span></button>
        <button type="button" data-k="직퇴" aria-pressed="false"><span class="em">🌙</span><span class="nm">직퇴</span><span class="sub">직접 퇴근</span></button>
      </div>

      <label class="lab">일시</label>
      <input type="datetime-local" id="when" />

      <label class="lab">업무 내용</label>
      <textarea id="memo" placeholder="예) KTC 계약서 전달 / 국토부 미팅"></textarea>

      <div id="retBox">
        <label class="lab">예상 복귀시간</label>
        <input type="time" id="ret" />
        <p class="hint" id="retHint">직퇴는 복귀시간이 없어 자동 생략됩니다.</p>
      </div>

      <button class="submit" id="go" disabled>등록하기</button>
    </div>
  </div>

  <div class="state" id="loading"><div><div class="spin"></div><p>등록 중…</p></div></div>
  <div class="state" id="done"><div><div class="icon">✅</div><h2>등록 완료</h2><p>단톡방에 게시되고 시트에 저장됐어요.<br/>잠시 후 창이 닫힙니다.</p></div></div>
  <div class="state" id="err"><div><div class="icon">⚠️</div><h2>등록 실패</h2><p id="errMsg">잠시 후 다시 시도해 주세요.</p><button class="retry" onclick="location.reload()">다시 시도</button></div></div>

<script>
  // ====== 설정 (LINE 콘솔에서 발급받아 채워넣기) ======
  const LIFF_ID = "YOUR_LIFF_ID";                 // LINE Developers > LIFF 에서 발급
  const GAS_ENDPOINT = "YOUR_APPS_SCRIPT_WEB_APP_URL"; // 배포된 Apps Script 웹앱 URL
  // ===================================================

  const $ = (id)=>document.getElementById(id);
  let picked = null, profile = null, ctxType = null;

  // 기본 일시 = 현재시각
  (function setNow(){
    const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
    $("when").value=d.toISOString().slice(0,16);
  })();

  // 구분 선택
  $("seg").addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b)return;
    [...$("seg").children].forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
    picked=b.dataset.k;
    document.documentElement.style.setProperty("--accent",
      picked==="직출"?"var(--in)":picked==="직퇴"?"var(--out)":"var(--field)");
    // 직퇴면 복귀시간 비활성화
    $("retBox").classList.toggle("row-dim",picked==="직퇴");
    validate();
  });
  ["when","memo","ret"].forEach(id=>$(id).addEventListener("input",validate));
  function validate(){ $("go").disabled = !(picked && $("when").value && $("memo").value.trim()); }

  // LIFF 초기화
  async function boot(){
    try{
      await liff.init({ liffId: LIFF_ID });
      ctxType = (liff.getContext()||{}).type;        // group / room / utou / external
      profile = await liff.getProfile();
      $("uname").textContent = profile.displayName;
      $("ini").textContent = profile.displayName.slice(0,1);
      $("usub").textContent = "(자동 인식)";
    }catch(err){
      // 콘솔/PC 미리보기 등 LIFF 밖에서 열렸을 때
      $("uname").textContent = "테스트 사용자";
      $("usub").textContent = "(LIFF 외부)";
      console.warn("LIFF init 실패:",err);
    }
  }
  boot();

  // 등록
  $("go").addEventListener("click", async ()=>{
    const name = profile?.displayName || "사용자";
    const when = $("when").value.replace("T"," ");
    const memo = $("memo").value.trim();
    const ret  = picked==="직퇴" ? "-" : ($("ret").value || "-");

    const text =
`[${name} · ${picked}]
일시: ${when}
업무내용: ${memo}
예상 복귀시간: ${ret}`;

    $("loading").classList.add("on");
    try{
      // 1) 시트 적재
      await fetch(GAS_ENDPOINT,{
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"}, // GAS CORS 회피용
        body:JSON.stringify({
          userId: profile?.userId||"", name, type:picked,
          when, memo, ret, ts:new Date().toISOString()
        })
      });
      // 2) 단톡방 게시 (사용자 명의 전송 = 무료, 그룹/룸에서 열렸을 때만 가능)
      if(["group","room","utou"].includes(ctxType)){
        await liff.sendMessages([{type:"text",text}]);
      }
      $("loading").classList.remove("on");
      $("done").classList.add("on");
      setTimeout(()=>{ if(liff.isInClient&&liff.isInClient()) liff.closeWindow(); },1400);
    }catch(err){
      $("loading").classList.remove("on");
      $("errMsg").textContent = (err&&err.message)? err.message : "잠시 후 다시 시도해 주세요.";
      $("err").classList.add("on");
    }
  });
</script>
</body>
</html>
